name: WhaleTrucker Health Check
on: [push, pull_request]

jobs:
  audit-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      - name: Run Audit
        run: |
          brew tap scutuatua-crypto/homebrew-whaletrucker
          brew audit --strict Formula/scutua-mcp.rb
